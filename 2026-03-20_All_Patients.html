    var colors = {"CC": "#3388ff", "MC": "#33aa55", "MD": "#dd3333", "SP": "#ff8833"};
    var labels = {"CC": "Commercial (CC)", "MC": "MediCare (MC)", "MD": "Medicaid (MD)", "SP": "Self-Pay (SP)"};
    var maxCount = 703;

    // --- Radius scaling ---
    // Log scaling gives much better visual separation between small and large counts.
    // A zip with 1 patient gets minR; the largest zip gets maxR.
    function getRadius(count) {
        var minR = 3, maxR = 45;
        if (maxCount <= 1) return minR;
        return minR + (maxR - minR) * (Math.log(count) / Math.log(maxCount));
    }

    // --- Opacity scaling ---
    // Faint for low counts, bold for high counts (double visual cue with size)
    function getFillOpacity(count) {
        var minOp = 0.15, maxOp = 0.65;
        if (maxCount <= 1) return maxOp;
        return minOp + (maxOp - minOp) * (Math.log(count) / Math.log(maxCount));
    }

    // --- Create layer groups per insurance type ---
    var layerGroups = {};
    var overlays = {};

    // Collect unique insurance types from data
    var insTypes = [];
    markers.forEach(function(m) {
        if (insTypes.indexOf(m.ins) === -1) insTypes.push(m.ins);
    });
    insTypes.sort();

    insTypes.forEach(function(ins) {
        layerGroups[ins] = L.layerGroup();
    });

    // --- Add circle markers ---
    markers.forEach(function(m) {
        var color = colors[m.ins] || '#999999';
        var label = labels[m.ins] || m.ins;
        var circle = L.circleMarker([m.lat, m.lng], {
            radius: getRadius(m.count),
            fillColor: color,
            color: color,
            weight: 1.5,
            opacity: 0.85,
            fillOpacity: getFillOpacity(m.count)
        });
        circle.bindPopup(
            '<b>Zip: ' + m.zip + '</b><br>' +
            label + '<br>' +
            'Patients: ' + m.count
        );
        circle.bindTooltip(m.zip + ': ' + m.count, {direction: 'top', offset: [0, -5]});
        layerGroups[m.ins].addLayer(circle);
    });

    // Add all layer groups to map and build overlay control
    insTypes.forEach(function(ins) {
        layerGroups[ins].addTo(map);
        var label = labels[ins] || ins;
        var color = colors[ins] || '#999';
        overlays['<span style="color:' + color + '; font-weight:bold;">&#9679;</span> ' + label] = layerGroups[ins];
    });

    L.control.layers(null, overlays, {collapsed: false, position: 'topright'}).addTo(map);

    // --- Legend ---
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        var div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<h4>Bubble Size</h4>';

        var refs = [1, Math.round(maxCount * 0.25), Math.round(maxCount * 0.5), maxCount];
        // Deduplicate and filter
        var seen = {};
        refs = refs.filter(function(v) {
            if (v < 1 || seen[v]) return false;
            seen[v] = true;
            return true;
        });
        refs.forEach(function(c) {
            var r = getRadius(c);
            div.innerHTML += '<div class="legend-item" style="margin: 4px 0;">' +
                '<svg width="' + (r*2+4) + '" height="' + (r*2+4) + '">' +
                '<circle cx="' + (r+2) + '" cy="' + (r+2) + '" r="' + r + '" ' +
                'fill="#888" fill-opacity="0.4" stroke="#888" stroke-width="1.5"/></svg>' +
                ' <span>' + c + ' patient' + (c !== 1 ? 's' : '') + '</span></div>';
        });
        return div;
    };
    legend.addTo(map);

    // --- Info panel showing totals ---
    var info = L.control({position: 'topleft'});
    info.onAdd = function() {
        var div = L.DomUtil.create('div', 'info-panel');
        var total = 0;
        var byIns = {};
        markers.forEach(function(m) {
            total += m.count;
            byIns[m.ins] = (byIns[m.ins] || 0) + m.count;
        });
        var html = '<h4>Patient Summary</h4>';
        html += '<div>Total: <b>' + total + '</b></div>';
        insTypes.forEach(function(ins) {
            var color = colors[ins] || '#999';
            var label = labels[ins] || ins;
            html += '<div><span style="color:' + color + ';">&#9679;</span> ' +
                     label + ': <b>' + (byIns[ins] || 0) + '</b></div>';
        });
        div.innerHTML = html;
        return div;
    };
    info.addTo(map);
